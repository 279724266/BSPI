<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>一键调用Spug接口</title>
    <style>
        /* 基础样式，仅保证按钮可见 */
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <button id="callBtn">点击调用接口</button>
    <div id="result"></div>

    <script>
        // 获取按钮和结果展示元素
        const callBtn = document.getElementById('callBtn');
        const resultDiv = document.getElementById('result');

        // 接口调用核心函数
        async function callSpugApi() {
            // 禁用按钮防止重复点击
            callBtn.disabled = true;
            callBtn.textContent = '调用中...';
            resultDiv.textContent = '';

            try {
                // 调用Spug接口
                const response = await fetch('https://push.spug.cc/send/Lo5Ngm7nwn8GRAW0', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    // 接口请求参数（根据你的模板调整，这里是默认示例）
                    body: JSON.stringify({
                        targets: '13572548672', // 替换成你要发送的手机号
                        // code: '8888',         // 替换成你要发送的验证码
                        // name: '警告！！'         // 模板中如果有name变量则保留，没有可删除
                    })
                });

                // 解析响应结果
                const result = await response.json();
                // 展示结果（格式化JSON，方便查看）
                resultDiv.textContent = `接口响应：\n${JSON.stringify(result, null, 2)}`;
                
            } catch (error) {
                // 捕获网络错误等异常
                resultDiv.textContent = `调用失败：${error.message}`;
                resultDiv.style.color = 'red';
            } finally {
                // 恢复按钮状态
                callBtn.disabled = false;
                callBtn.textContent = '点击调用接口';
            }
        }

        // 绑定按钮点击事件
        callBtn.addEventListener('click', callSpugApi);
    </script>
</body>
</html>
